# AirPlay Configuration

# Configuration settings for AirPlay

# The name of the device
device_name = "MyAirPlayDevice"

# The port on which to run AirPlay
port = 7000

# Enable or disable AirPlay
enabled = true

# Maximum number of connections
max_connections = 5

# Set specific settings for audio and video streams
allow_audio_stream = true
allow_video_stream = true
